{% extends "base.html" %}

{% block title %}{{ title }} - Paper Portfolio Tracker{% endblock %}

{% block content %}
  <section class="panel form-panel">
    <div class="panel-head">
      <h2>{{ title }}</h2>
      <p>Each portfolio stores a cash balance and its positions in SQLite.</p>
    </div>

    <form class="form-grid" action="{{ form_action }}" method="post">
      <label>
        <span>Name</span>
        <input type="text" name="name" value="{{ portfolio.name if portfolio else '' }}" placeholder="Long-term paper portfolio" required>
      </label>

      <label>
        <span>Cash balance</span>
        <input type="number" name="cash_balance" min="0" step="0.01" value="{{ portfolio.cash_balance if portfolio else '0.00' }}" placeholder="10000.00">
      </label>

      <div class="action-row">
        <button class="button button-primary" type="submit">Save</button>
        <a class="button button-secondary" href="{{ url_for('tracker.index', portfolio_id=portfolio.id) if portfolio else url_for('tracker.index') }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
